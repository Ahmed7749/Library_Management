<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Category</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

<div style="max-width: 500px; width: 100%; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);">

    <h2 style="text-align: center; color: #333333; margin-bottom: 20px;">Create New Category</h2>

    <form th:action="@{/categories/create}" th:object="${category}" method="post" style="display: flex; flex-direction: column; gap: 15px;">

        <div>
            <label for="name" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Category Name:</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter category name (e.g., Science Fiction)"
                   style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: #d9534f; font-size: 13px; display: block; margin-top: 5px;"></span>
        </div>

        <div style="margin-top: 10px;">
            <button type="submit" style="width: 100%; background-color: #2196F3; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                Save Category
            </button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/categories/home}" style="color: #666666; text-decoration: none; font-size: 14px;">← Back to Category Dashboard</a>
    </div>

</div>

</body>
</html>
