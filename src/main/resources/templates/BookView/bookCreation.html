<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Book</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

<div style="max-width: 500px; width: 100%; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);">

    <h2 style="text-align: center; color: #333333; margin-bottom: 20px;">Register New Book</h2>

    <form th:action="@{/books/create}" th:object="${book}" method="post" style="display: flex; flex-direction: column; gap: 15px;">

        <div>
            <label for="title" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Book Title:</label>
            <input type="text" id="title" th:field="*{title}" placeholder="Enter book title (min 10 chars)"
                   style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;">
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: #d9534f; font-size: 13px; display: block; margin-top: 5px;"></span>
        </div>

        <div>
            <label for="isbn" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">ISBN:</label>
            <input type="text" id="isbn" th:field="*{isbn}" placeholder="Enter ISBN"
                   style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;">
            <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" style="color: #d9534f; font-size: 13px; display: block; margin-top: 5px;"></span>
        </div>

        <div>
            <label for="pageCount" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Page Count:</label>
            <input type="number" id="pageCount" th:field="*{pageCount}" placeholder="Enter number of pages"
                   style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;">
            <span th:if="${#fields.hasErrors('pageCount')}" th:errors="*{pageCount}" style="color: #d9534f; font-size: 13px; display: block; margin-top: 5px;"></span>
        </div>

        <div>
            <label for="status" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Status:</label>
            <select id="status" th:field="*{status}" style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; background-color: white;">
                <option value="">-- Select Status --</option>
                <option value="Available">Available</option>
                <option value="Borrowed">Borrowed</option>
                <option value="Maintenance">Maintenance</option>
            </select>
            <span th:if="${#fields.hasErrors('status')}" th:errors="*{status}" style="color: #d9534f; font-size: 13px; display: block; margin-top: 5px;"></span>
        </div>

        <div>
            <label for="author" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Author ID:</label>
            <select id="author" th:field="*{author}" style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; background-color: white;" required>
                <option value="">-- Select Author --</option>
                <option th:each="author : ${authors}" th:value="${author.id}" th:text="${author.authorName}"></option>
            </select>
        </div>

        <div>
            <label for="category" style="display: block; margin-bottom: 5px; color: #555555; font-weight: bold;">Category ID:</label>
            <select id="category" th:field="*{category}" style="width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; background-color: white;" required>
                <option value="">-- Select Category --</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>

        <div style="margin-top: 10px;">
            <button type="submit" style="width: 100%; background-color: #2196F3; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                Save Book
            </button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/books/home}" style="color: #666666; text-decoration: none; font-size: 14px;">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
