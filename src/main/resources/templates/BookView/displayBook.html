<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books Inventory</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px;">

<div style="max-width: 1000px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: #333333; margin: 0;">Library Books Inventory</h2>
        <a th:href="@{/books/create}" style="background-color: #2196F3; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            ➕ Add New Book
        </a>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead>
        <tr style="background-color: #4CAF50; color: white; text-align: left;">
            <th style="padding: 14px; border: 1px solid #dddddd;">ID</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">Title</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">ISBN</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">Pages</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">Status</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">Author</th>
            <th style="padding: 14px; border: 1px solid #dddddd;">Category</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${booksList}" style="background-color: #fcfcfc; border-bottom: 1px solid #dddddd;">
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;" th:text="${book.id}">1</td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #333333; font-weight: bold;" th:text="${book.title}">Sample Book</td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;" th:text="${book.isbn}">1234567890</td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;" th:text="${book.pageCount}">300</td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;">
                        <span th:text="${book.status}"
                              th:style="${book.status == 'Available'} ? 'color: #28a745; font-weight: bold;' : 'color: #d9534f; font-weight: bold;'">
                            Available
                        </span>
            </td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;" th:text="${book.author.authorName}">300</td>
            <td style="padding: 12px; border: 1px solid #dddddd; color: #555555;" th:text="${book.category.name}">300</td>
        </tr>

        <tr th:if="${#lists.isEmpty(booksList)}">
            <td colspan="5" style="padding: 20px; text-align: center; color: #999999; font-style: italic; border: 1px solid #dddddd;">
                No books currently found in the inventory.
            </td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 20px;">
        <a th:href="@{/}" style="color: #666666; text-decoration: none; font-size: 14px;">← Back to Main Dashboard</a>
    </div>

</div>

</body>
</html>
