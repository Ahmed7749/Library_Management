<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Management System - Dashboard</title>
</head>
    <body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="max-width: 600px; width: 100%; background-color: #ffffff; padding: 50px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); text-align: center;">

        <h1 style="color: #2c3e50; margin-top: 0; margin-bottom: 15px; font-size: 32px;">Library Management System</h1>
        <p style="color: #7f8c8d; margin-bottom: 40px; font-size: 16px;">Welcome! Please select a module below to manage your library records.</p>

        <div style="display: flex; flex-direction: column; gap: 20px; max-width: 350px; margin: 0 auto;">

            <a th:href="@{/books/home}" style="display: block; background-color: #3498db; color: white; text-decoration: none; padding: 18px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); transition: transform 0.2s;">
                📚 Manage Books
            </a>

            <a th:href="@{/authors/home}" style="display: block; background-color: #9b59b6; color: white; text-decoration: none; padding: 18px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(155, 89, 182, 0.3); transition: transform 0.2s;">
                ✍️ Manage Authors
            </a>

            <a th:href="@{/categories/home}" style="display: block; background-color: #e67e22; color: white; text-decoration: none; padding: 18px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(230, 126, 34, 0.3); transition: transform 0.2s;">
                📂 Manage Categories
            </a>

        </div>

        <div style="margin-top: 40px; border-top: 1px solid #eeeeee; padding-top: 20px;">
            <p style="color: #bdc3c7; font-size: 12px; margin: 0;">System Status: <span style="color: #27ae60; font-weight: bold;">Online</span></p>
        </div>

    </div>
    </body>
</html>
