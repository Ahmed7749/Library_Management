<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Management - Home</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

<div style="max-width: 600px; width: 100%; background-color: #ffffff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); text-align: center;">

    <h1 style="color: #333333; margin-top: 0; margin-bottom: 10px;">Library Dashboard</h1>
    <p style="color: #666666; margin-bottom: 40px; font-size: 16px;">Welcome to the Library Management System. Please select a module to manage.</p>

    <div style="display: flex; flex-direction: column; gap: 20px; max-width: 300px; margin: 0 auto;">

        <a th:href="@{/authors/display}" style="display: block; background-color: #4CAF50; color: white; text-decoration: none; padding: 15px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            📖 View Authors Directory
        </a>

        <a th:href="@{/authors/create}" style="display: block; background-color: #2196F3; color: white; text-decoration: none; padding: 15px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            ✍️ Add New Author
        </a>

    </div>

</div>

</body>
</html>
